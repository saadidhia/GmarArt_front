name: CI

on:
  push:
    branches:
      - master
      - prod

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: feroukart-build
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/prod'
    environment: env

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: feroukart-build
          path: dist

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_BUSINESS_SERVER }}

      - name: Deploy frontend to server
        run: |
          echo "🚀 Deploying FeroukArt frontend..."
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_SERVER_IP }} "mkdir -p /var/www/feroukart && rm -rf /var/www/feroukart/*"
          scp -o StrictHostKeyChecking=no -r dist/* root@${{ secrets.HETZNER_SERVER_IP }}:/var/www/feroukart/
          ssh -o StrictHostKeyChecking=no root@${{ secrets.HETZNER_SERVER_IP }} "systemctl reload nginx || true"
          echo "✅ Frontend deployed successfully!"
